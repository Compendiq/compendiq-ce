name: compendiq-test

services:
  postgres-test:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: changeme-postgres
      POSTGRES_DB: kb_creator_test
    # Long-form publish pinned to loopback so the throwaway test DB (weak
    # hardcoded password) is never reachable from the network — mirrors the
    # deliberate 127.0.0.1 binding in docker-compose.dev.yml.
    ports:
      - target: 5432
        host_ip: 127.0.0.1
        published: 5433
        protocol: tcp
        mode: host
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d kb_creator_test"]
      interval: 2s
      timeout: 2s
      retries: 10
