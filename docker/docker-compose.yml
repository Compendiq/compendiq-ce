name: compendiq

# =============================================================================
# Production hardening (issue #1050)
#
# This file carries `build:` sections — it is the build-and-run source, so the
# images are tagged `:dev`. Production deployments that DON'T build (they pull
# a published image) MUST pin an immutable reference — a version tag such as
# `:0.6.2` or, ideally, a `@sha256:...` digest — so the running artifact can
# never be silently repointed. See docs/architecture/05-deployment.md.
#
# Every service runs with least privilege: `cap_drop: [ALL]`,
# `no-new-privileges:true`, and non-swarm resource limits
# (`mem_limit`/`cpus`/`pids_limit`). The three stateless services
# (frontend, backend, mcp-docs) additionally run `read_only: true` with an
# explicit writable `tmpfs`. postgres/redis re-add only the capabilities their
# entrypoints need to step down from root to their service user via gosu.
# =============================================================================

services:
  frontend:
    image: ghcr.io/compendiq/compendiq-ce-frontend:dev
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-8081}:8081"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # Least privilege: nginx (runs as USER nginx) needs no Linux capabilities.
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      # nginx writes its pid + every *_temp path under /tmp (frontend/nginx.conf);
      # /var/cache/nginx and /var/run cover the base image's default writable paths.
      - /tmp
      - /var/cache/nginx
      - /var/run
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 100
    # Isolated to frontend-net only: the browser-facing container can reach the
    # backend but NOT redis/searxng/mcp-docs/postgres (issue #1050).
    networks: [frontend-net]

  backend:
    image: ghcr.io/compendiq/compendiq-ce-backend:dev
    build:
      context: ..
      dockerfile: backend/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No host port mapping on purpose: the backend is only reachable through
    # the frontend nginx proxy, which applies the CSP / security headers
    # (frontend/nginx-security-headers.conf). Publishing the API directly
    # would bypass the only XSS mitigation for served HTML attachments.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_PORT: "3051"
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kb_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set a strong password, e.g. openssl rand -hex 24}@postgres:5432/${POSTGRES_DB:-kb_creator}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong password, e.g. openssl rand -hex 24}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PAT_ENCRYPTION_KEY: ${PAT_ENCRYPTION_KEY:?PAT_ENCRYPTION_KEY is required}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      FTS_LANGUAGE: ${FTS_LANGUAGE:-simple}
      LLM_AUTH_TYPE: ${LLM_AUTH_TYPE:-bearer}
      LLM_VERIFY_SSL: ${LLM_VERIFY_SSL:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8081}
      QUALITY_CHECK_INTERVAL_MINUTES: ${QUALITY_CHECK_INTERVAL_MINUTES:-60}
      QUALITY_BATCH_SIZE: ${QUALITY_BATCH_SIZE:-5}
      SUMMARY_CHECK_INTERVAL_MINUTES: ${SUMMARY_CHECK_INTERVAL_MINUTES:-60}
      SUMMARY_BATCH_SIZE: ${SUMMARY_BATCH_SIZE:-5}
      SYNC_INTERVAL_MIN: ${SYNC_INTERVAL_MIN:-15}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LLM_CACHE_TTL: ${LLM_CACHE_TTL:-3600}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-compendiq-backend}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      CONFLUENCE_VERIFY_SSL: ${CONFLUENCE_VERIFY_SSL:-true}
      CONFLUENCE_DOCKER_HOST: ${CONFLUENCE_DOCKER_HOST:-confluence}
      ATTACHMENTS_DIR: /app/data/attachments
      NODE_EXTRA_CA_CERTS: ${CONTAINER_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}
      MCP_DOCS_URL: ${MCP_DOCS_URL:-http://mcp-docs:3100/mcp}
      MCP_DOCS_TOKEN: ${MCP_DOCS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # SIGTERM → drain BullMQ workers + HTTP → close DB pools before SIGKILL.
    # Must exceed the in-process SHUTDOWN_TIMEOUT_MS (default 50s) so the
    # handler force-exits itself first; 60s leaves Docker a 10s margin.
    # See ADR-024 (Graceful-shutdown order) and issue #931.
    stop_grace_period: 60s
    volumes:
      - attachments:/app/data
      - "${HOST_CA_BUNDLE_PATH:-/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem}:${CONTAINER_CA_BUNDLE_PATH:-/etc/ssl/certs/ca-certificates.crt}:ro"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3051/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Least privilege: node (runs as USER node) needs no Linux capabilities.
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      # Root FS is read-only. Persistent writes go to the `attachments` named
      # volume (/app/data, from ATTACHMENTS_DIR); the CA bundle is bind-mounted
      # read-only. Only transient scratch needs a writable /tmp.
      - /tmp
    mem_limit: 1024m
    cpus: 2.0
    pids_limit: 512
    # frontend-net: reachable by the nginx proxy. backend-net: reach mcp-docs.
    # data-net: reach postgres/redis.
    networks: [frontend-net, backend-net, data-net]

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set a strong password, e.g. openssl rand -hex 24}
      POSTGRES_DB: ${POSTGRES_DB:-kb_creator}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb_user} -d ${POSTGRES_DB:-kb_creator}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Least privilege. The official postgres image starts as root, chowns PGDATA
    # and steps down to the postgres user via gosu, so it needs exactly these
    # caps back after dropping ALL — a bare cap_drop:[ALL] fails startup.
    # read_only is intentionally NOT set: postgres owns a complex writable data
    # dir + runtime sockets. Isolation is via the data volume + internal network.
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 1024m
    cpus: 2.0
    pids_limit: 300
    networks: [data-net]

  mcp-docs:
    image: ghcr.io/compendiq/compendiq-ce-mcp-docs:dev
    build:
      context: ..
      dockerfile: mcp-docs/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3100"
      MCP_DOCS_HOST: "0.0.0.0"
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong password, e.g. openssl rand -hex 24}@redis:6379
      LOG_LEVEL: ${MCP_LOG_LEVEL:-info}
      CACHE_TTL_SECONDS: ${MCP_CACHE_TTL:-3600}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      MCP_DOCS_TOKEN: ${MCP_DOCS_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Least privilege: node (runs as USER appuser) needs no Linux capabilities.
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      # Stateless: the doc cache lives in redis, not on disk. Only /tmp scratch.
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    networks: [backend-net]

  searxng:
    image: ghcr.io/compendiq/compendiq-ce-searxng:dev
    build:
      context: ./searxng
      dockerfile: Dockerfile
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080}
      SEARXNG_LIMITER: ${SEARXNG_LIMITER:-false}
      SEARXNG_IMAGE_PROXY: ${SEARXNG_IMAGE_PROXY:-false}
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Least privilege: runs as USER searxng (no root step-down) so no caps are
    # needed. read_only is NOT set — the entrypoint renders settings.yml into
    # the upstream /etc/searxng volume at boot.
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 200
    networks: [backend-net]

  redis:
    image: redis:8-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong password, e.g. openssl rand -hex 24}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong password, e.g. openssl rand -hex 24} redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Least privilege. The official redis image starts as root, chowns /data and
    # steps down to the redis user via gosu, so it needs exactly these caps back
    # after dropping ALL — a bare cap_drop:[ALL] fails startup. read_only is NOT
    # set: redis owns /data (RDB/AOF) and its runtime socket.
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt: ["no-new-privileges:true"]
    # mem_limit is above --maxmemory 256mb so redis stays within its own cap
    # before Docker's OOM killer intervenes.
    mem_limit: 320m
    cpus: 0.5
    pids_limit: 100
    networks: [data-net, backend-net]

volumes:
  postgres-data:
  attachments:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge
    internal: true
