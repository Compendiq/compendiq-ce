name: Bug Report
description: Report a bug or unexpected behavior in AtlasMind
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below to help us investigate and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AtlasMind Version
      description: Which version of AtlasMind are you running? (Check the footer or package.json)
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running AtlasMind?
      options:
        - Docker Compose
        - Manual (npm run dev)
        - Docker (custom setup)
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / OS
      description: What operating system is the server running on?
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: If this is a frontend issue, which browser are you using?
      placeholder: e.g., Chrome 130, Firefox 132, Safari 18

  - type: dropdown
    id: llm-provider
    attributes:
      label: LLM Provider
      description: Which LLM provider are you using?
      options:
        - Ollama (default)
        - OpenAI-compatible API
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Please paste any relevant log output. Backend logs can be found in the terminal
        or via `docker compose logs backend`. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
