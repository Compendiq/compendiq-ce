name: Feature Request
description: Suggest a new feature or enhancement for AtlasMind
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the form below so we can understand your idea.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you'd like to see.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: |
        Describe the problem this feature would solve or the workflow it would improve.
        Why is this feature important to you?
      placeholder: |
        As a [type of user], I want to [do something] so that [benefit]...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: |
        If you have an idea for how this could be implemented, describe it here.
        Include any UI/UX mockups, API design thoughts, or technical considerations.
      placeholder: Describe your proposed solution...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternatives you've considered...

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of AtlasMind does this feature relate to?
      options:
        - Frontend / UI
        - Backend / API
        - Confluence Integration
        - LLM / AI Features
        - RAG / Search
        - Authentication / Authorization
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references about the feature request here.
