name: PR Check

on:
  pull_request:
    branches: [dev, main]

# Cancel in-progress runs for the same PR — saves CI minutes on rapid pushes
concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (contracts + backend + frontend)
        run: npm run typecheck

      - name: Lint (backend + frontend)
        run: npm run lint

  test:
    name: Tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: changeme-postgres
          POSTGRES_DB: kb_creator_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U kb_user -d kb_creator_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_TEST_URL: postgresql://kb_user:changeme-postgres@localhost:5433/kb_creator_test
      POSTGRES_URL: postgresql://kb_user:changeme-postgres@localhost:5433/kb_creator_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
      PAT_ENCRYPTION_KEY: ci-test-encryption-key-at-least-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build contracts
        run: npm run build -w @compendiq/contracts

      - name: Backend tests (with coverage)
        run: npm run test:coverage -w backend

      - name: Frontend tests
        run: npm test -w frontend

      - name: Contracts tests
        run: npm test -w @compendiq/contracts
