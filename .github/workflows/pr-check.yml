name: PR Check

on:
  pull_request:
    branches: [dev, main]

# Cancel in-progress runs for the same PR — saves CI minutes on rapid pushes
concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The runtime Docker stage copies only the root node_modules. If npm's
      # hoister demotes a backend prod dep to backend/node_modules (e.g.
      # because a root devDep chain pins a conflicting major), the dep
      # disappears at runtime and the container crash-loops on boot —
      # invisible to `npm run build` and to `docker build` alike. Simulate
      # the Docker prod-deps install in a tmpdir and assert the two
      # historically-fragile packages stay at the root.
      - name: Verify prod-deps hoist runtime-critical packages to root
        run: |
          set -euo pipefail
          T=$(mktemp -d)
          mkdir -p "$T/backend" "$T/packages/contracts" "$T/frontend"
          cp package.json package-lock.json "$T/"
          cp backend/package.json "$T/backend/"
          cp packages/contracts/package.json "$T/packages/contracts/"
          cp frontend/package.json "$T/frontend/"
          (cd "$T" && npm ci --omit=dev -w backend -w @compendiq/contracts >/dev/null)
          missing=()
          for pkg in p-limit ipaddr.js; do
            test -d "$T/node_modules/$pkg" || missing+=("$pkg")
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Prod deps not hoisted to root node_modules: ${missing[*]}"
            echo "  These are listed in root package.json 'dependencies' so npm hoists them."
            echo "  See the //deps-note in package.json for context."
            exit 1
          fi
          echo "✓ p-limit + ipaddr.js hoisted to root node_modules"

      - name: Typecheck (contracts + backend + frontend)
        run: npm run typecheck

      - name: Lint (backend + frontend)
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: changeme-postgres
          POSTGRES_DB: kb_creator_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U kb_user -d kb_creator_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_TEST_URL: postgresql://kb_user:changeme-postgres@localhost:5433/kb_creator_test
      POSTGRES_URL: postgresql://kb_user:changeme-postgres@localhost:5433/kb_creator_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
      PAT_ENCRYPTION_KEY: ci-test-encryption-key-at-least-32-chars

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build contracts
        run: npm run build -w @compendiq/contracts

      - name: Backend tests (with coverage)
        run: npm run test:coverage -w backend

      - name: Frontend tests
        run: npm test -w frontend

      - name: Contracts tests
        run: npm test -w @compendiq/contracts

  mcp-docs:
    name: MCP Docs Sidecar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-docs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: package.json
          cache: npm
          cache-dependency-path: mcp-docs/package-lock.json

      - name: Install MCP docs dependencies
        run: npm ci

      - name: Typecheck MCP docs
        run: npm run typecheck

      - name: Test MCP docs
        run: npm test
