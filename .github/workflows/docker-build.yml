name: Docker Build & Push

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:

jobs:
  docker-backend:
    name: Backend Image
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to DHI registry (base images)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ vars.DHI_USER }}
          password: ${{ secrets.DHI_PAT }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DHI_USER }}
          password: ${{ secrets.DHI_PAT }}

      - name: Extract metadata for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: diinlu/atlasmind-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=registry,ref=diinlu/atlasmind-backend:buildcache
          cache-to: type=registry,ref=diinlu/atlasmind-backend:buildcache,mode=max
          sbom: true
          provenance: mode=max

  docker-frontend:
    name: Frontend Image
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to DHI registry (base images)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ vars.DHI_USER }}
          password: ${{ secrets.DHI_PAT }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DHI_USER }}
          password: ${{ secrets.DHI_PAT }}

      - name: Extract metadata for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: diinlu/atlasmind-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=registry,ref=diinlu/atlasmind-frontend:buildcache
          cache-to: type=registry,ref=diinlu/atlasmind-frontend:buildcache,mode=max
          sbom: true
          provenance: mode=max
