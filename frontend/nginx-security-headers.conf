# Shared security headers — included in every location block.
# Defined here (not at the server level) to avoid nginx's add_header
# inheritance pitfall: any add_header in a location block silently
# clears ALL server-level add_header directives.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# X-XSS-Protection is intentionally NOT set: the legacy XSS auditor it toggled
# is removed from all modern browsers and the header can itself introduce
# vulnerabilities. CSP below is the modern replacement (#1053). It is likewise
# disabled in @fastify/helmet so neither layer re-adds it.
# Permissions-Policy locks down powerful browser features to the minimum the
# app needs. Everything is denied (empty allowlist ()) except fullscreen, which
# is granted to same-origin only so the self-hosted draw.io editor iframe can
# enter fullscreen. Kept as a single directive here so nginx emits it exactly
# once (#1053).
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), usb=()" always;
# CSP: style-src 'unsafe-inline' required by Tailwind/Framer Motion runtime styles.
# frame-src 'self' allows the self-hosted draw.io editor iframe.
# script-src hash allows the inline FOUC-prevention theme script in index.html.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-ObJ5XWyIAGJaK9GxB9+uDb//dIlE11VIM8RlldPLYIw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-src 'self';" always;
