# Shared security headers — included in every location block.
# Defined here (not at the server level) to avoid nginx's add_header
# inheritance pitfall: any add_header in a location block silently
# clears ALL server-level add_header directives.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# CSP: style-src 'unsafe-inline' required by Tailwind/Framer Motion runtime styles.
# frame-src: explicitly allows embed.diagrams.net for the draw.io editor iframe.
# Without frame-src, the CSP falls back to default-src 'self' which blocks the iframe in production.
# If using a self-hosted draw.io instance (configurable via Admin Settings), also add that origin here.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-src 'self' https://embed.diagrams.net;" always;
