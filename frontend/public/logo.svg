<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    AtlasMind — "The Neural Atlas"
    Seven nodes in a hexagonal constellation: brain + star-chart.
    Two subtle arcs suggest globe meridians.
  -->
  <defs>
    <linearGradient id="am" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="aa" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="ag" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Globe accent arcs -->
  <path d="M368 16 Q480 128 448 256" stroke="url(#aa)" stroke-width="12" stroke-linecap="round" opacity="0.1"/>
  <path d="M144 496 Q32 384 64 256" stroke="url(#aa)" stroke-width="12" stroke-linecap="round" opacity="0.1"/>

  <!-- Hexagonal outline -->
  <path d="M256 64 L408 160 L408 352 L256 448 L104 352 L104 160 Z"
        stroke="url(#am)" stroke-width="6" stroke-linejoin="round" opacity="0.15" />

  <!-- Radial connections (core to each outer node) -->
  <line x1="256" y1="256" x2="256" y2="64"  stroke="url(#am)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="256" x2="104" y2="160" stroke="url(#am)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="256" x2="408" y2="160" stroke="url(#am)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="256" x2="104" y2="352" stroke="url(#am)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="256" x2="408" y2="352" stroke="url(#am)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="256" x2="256" y2="448" stroke="url(#am)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>

  <!-- Core hub glow -->
  <circle cx="256" cy="256" r="96" fill="url(#ag)"/>

  <!-- Outer nodes -->
  <circle cx="256" cy="64"  r="36" fill="url(#am)"/>
  <circle cx="104" cy="160" r="28" fill="url(#am)" opacity="0.85"/>
  <circle cx="408" cy="160" r="28" fill="url(#am)" opacity="0.85"/>
  <circle cx="104" cy="352" r="28" fill="url(#am)" opacity="0.85"/>
  <circle cx="408" cy="352" r="28" fill="url(#am)" opacity="0.85"/>
  <circle cx="256" cy="448" r="36" fill="url(#am)"/>

  <!-- Core hub -->
  <circle cx="256" cy="256" r="48" fill="url(#am)"/>

  <!-- Specular highlight -->
  <circle cx="256" cy="256" r="18" fill="white" opacity="0.6"/>
</svg>
