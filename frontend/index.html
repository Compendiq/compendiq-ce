<!doctype html>
<html lang="en" data-theme="graphite-honey" data-theme-type="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compendiq</title>
    <meta name="description" content="AI-powered knowledge base management with Confluence integration, RAG-powered Q&A, and local Ollama LLM backend." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#f9c74f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f9c74f" media="(prefers-color-scheme: light)" />

    <!--
      Open Graph — og:image MUST be an absolute URL for social scrapers.
      Self-hosted deployments: replace the origin below with your actual domain.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Compendiq" />
    <meta property="og:description" content="AI-powered knowledge base management with Confluence integration, RAG-powered Q&A, and local Ollama LLM backend." />
    <meta property="og:image" content="https://compendiq.io/favicon-512.png" />
    <meta property="og:site_name" content="Compendiq" />

    <!-- Twitter/X falls back to og:* tags; only twitter:card is needed -->
    <meta name="twitter:card" content="summary" />

    <script>
      // Prevent FOUC: read persisted theme before React loads and apply
      // data-theme + data-theme-type + the `dark` class together. Doing all
      // three before first paint keeps Tailwind's `dark:` variants (e.g. the
      // header logo's `dark:invert`) and the `[data-theme-type]` CSS rules in
      // lockstep — no flash of dark-on-dark or light-on-light at boot.
      // Only the two current themes are honored; unknown values fall through
      // to the defaults already set on <html> above. Legacy localStorage keys
      // are still checked so upgrading users keep their preference.
      (function() {
        var VALID = { 'graphite-honey': 'dark', 'honey-linen': 'light' };
        try {
          var raw = localStorage.getItem('compendiq-theme')
                  || localStorage.getItem('atlasmind-theme')
                  || localStorage.getItem('kb-theme');
          if (raw) {
            var parsed = JSON.parse(raw);
            var theme = parsed && parsed.state && parsed.state.theme;
            if (theme && VALID[theme]) {
              var type = VALID[theme];
              document.documentElement.setAttribute('data-theme', theme);
              document.documentElement.dataset.themeType = type;
              document.documentElement.classList.toggle('dark', type === 'dark');
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="h-screen overflow-hidden bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
