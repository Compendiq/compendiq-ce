<!doctype html>
<html lang="en" data-theme="midnight-blue" data-theme-type="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtlasMind</title>
    <meta name="description" content="AI-powered knowledge base management with Confluence integration, RAG-powered Q&A, and local Ollama LLM backend." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />

    <!--
      Open Graph — og:image MUST be an absolute URL for social scrapers.
      Self-hosted deployments: replace the origin below with your actual domain.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AtlasMind" />
    <meta property="og:description" content="AI-powered knowledge base management with Confluence integration, RAG-powered Q&A, and local Ollama LLM backend." />
    <meta property="og:image" content="https://atlasmind.io/favicon-512.png" />
    <meta property="og:site_name" content="AtlasMind" />

    <!-- Twitter/X falls back to og:* tags; only twitter:card is needed -->
    <meta name="twitter:card" content="summary" />

    <script>
      // Prevent FOUC: read persisted theme before React loads.
      // Check new key first, fall back to legacy key for migration.
      (function() {
        var LIGHT = ['cloud-white','lavender-bloom','mint-fresh','peach-blossom',
          'sky-blue','lemon-drop','rose-garden','sage-light','sand-dune',
          'ice-crystal','catppuccin-latte'];
        try {
          var raw = localStorage.getItem('atlasmind-theme') || localStorage.getItem('kb-theme');
          if (raw) {
            var parsed = JSON.parse(raw);
            var theme = parsed && parsed.state && parsed.state.theme;
            if (theme) {
              document.documentElement.setAttribute('data-theme', theme);
              document.documentElement.dataset.themeType =
                LIGHT.indexOf(theme) !== -1 ? 'light' : 'dark';
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="h-screen overflow-hidden bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
